<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نموذج الاختبار</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #6c63ff, #4d44db);
    margin: 0;
    padding: 0;
}

.container {
    max-width: 500px;
    margin: 30px auto;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    animation: fadeIn 0.6s ease;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.progress {
    height: 8px;
    background: #eee;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#6c63ff,#00c6ff);
    border-radius: 10px;
    transition: 0.4s ease;
}

.card {
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 15px;
    background: #f8f9ff;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
}

label.title {
    font-weight: bold;
}

input[type="text"] {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input[type="text"]:focus {
    border-color: #6c63ff;
    outline: none;
    box-shadow: 0 0 8px rgba(108,99,255,0.3);
}

.option {
    background: #fff;
    padding: 12px;
    border-radius: 12px;
    margin-top: 8px;
    cursor: pointer;
    border: 1px solid #ddd;
    transition: 0.25s;
}

.option:hover {
    background: #f0f0ff;
}

input[type="radio"] {
    display: none;
}

input[type="radio"]:checked + .option {
    background: linear-gradient(135deg,#6c63ff,#4d44db);
    color: #fff;
    border-color: #6c63ff;
    transform: scale(1.03);
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg,#6c63ff,#4d44db);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

button.loading {
    pointer-events: none;
    opacity: 0.7;
}

button.loading::after {
    content: "⏳ جاري الإرسال...";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

.success {
    text-align: center;
    display: none;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">

<h2>📘 نموذج الاختبار</h2>

<div class="progress">
    <div class="progress-bar" id="progress"></div>
</div>

<form id="form"
action="https://docs.google.com/forms/d/e/1FAIpQLSc6zfIQgmNRSLQYCDk27pIbQ69NddkeoBub4vlSAiHxgdjAfw/formResponse"
method="POST"
target="hidden_iframe">

<div class="card">
<label class="title">الاسم *</label>
<input type="text" name="entry.193199173" id="name" required>
</div>

<div class="card">
<label class="title">٤ × ٥ = ؟ *</label>

<label>
<input type="radio" name="entry.1448958511" value="٢٠">
<div class="option">20</div>
</label>

<label>
<input type="radio" name="entry.1448958511" value="٢">
<div class="option">2</div>
</label>

<label>
<input type="radio" name="entry.1448958511" value="٣">
<div class="option">3</div>
</label>
</div>

<div class="card">
<label class="title">٥ × ٣ = ؟ *</label>

<label>
<input type="radio" name="entry.735351684" value="١٥">
<div class="option">15</div>
</label>

<label>
<input type="radio" name="entry.735351684" value="٨">
<div class="option">8</div>
</label>
</div>

<button id="submitBtn" type="submit">إرسال الإجابات 🚀</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<div class="success" id="success">
<h3>🎉 تم الإرسال بنجاح</h3>
<p>شكراً لمشاركتك</p>
</div>

</div>

<script>
const form = document.getElementById("form");
const progress = document.getElementById("progress");
const btn = document.getElementById("submitBtn");

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("change", updateProgress);
    input.addEventListener("input", updateProgress);
});

function updateProgress() {
    let total = 3;
    let done = 0;

    if(document.getElementById("name").value) done++;
    if(document.querySelector('input[name="entry.1448958511"]:checked')) done++;
    if(document.querySelector('input[name="entry.735351684"]:checked')) done++;

    progress.style.width = (done / total * 100) + "%";
}

form.addEventListener("submit", function(e) {
    if(!document.getElementById("name").value){
        alert("اكتب اسمك أولاً");
        e.preventDefault();
        return;
    }

    btn.classList.add("loading");

    setTimeout(() => {
        form.style.display = "none";
        document.getElementById("success").style.display = "block";
    }, 800);
});
</script>

</body>
</html>
